apiVersion: apps/v1
kind: Deployment
metadata:
  name: resqnet-deployment
  labels:
    app: resqnet
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resqnet
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: resqnet
    spec:
      containers:
        - name: resqnet-app
          image: YOUR_DOCKERHUB_USERNAME/resqnet-app:IMAGE_TAG
          ports:
            - containerPort: 5000
          env:
            - name: FLASK_ENV
              value: "production"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10

---
- name: Configure ResQNet Application Server
  hosts: resqnet_servers
  become: yes
  vars:
    app_dir: /opt/resqnet
    docker_image: "{{ docker_username }}/resqnet-app:latest"

  tasks:

    # ─────────────────────────────────────────
    # SYSTEM SETUP
    # ─────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - docker.io
          - docker-compose
          - curl
          - git
          - python3-pip
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    # ─────────────────────────────────────────
    # KUBECTL INSTALL
    # ─────────────────────────────────────────
    - name: Download kubectl
      get_url:
        url: "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    # ─────────────────────────────────────────
    # APP DEPLOYMENT
    # ─────────────────────────────────────────
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Pull latest Docker image
      docker_image:
        name: "{{ docker_image }}"
        source: pull
        force_source: yes

    - name: Stop existing container (if running)
      docker_container:
        name: resqnet-app
        state: absent
      ignore_errors: yes

    - name: Run ResQNet container
      docker_container:
        name: resqnet-app
        image: "{{ docker_image }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "5000:5000"
        env:
          FLASK_ENV: "production"

    # ─────────────────────────────────────────
    # HEALTH CHECK
    # ─────────────────────────────────────────
    - name: Wait for app to be ready
      uri:
        url: "http://localhost:5000/health"
        method: GET
        status_code: 200
      retries: 10
      delay: 5
      register: health_result

    - name: Print deployment status
      debug:
        msg: "ResQNet is running! Status: {{ health_result.json.status }}"

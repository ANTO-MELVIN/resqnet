name: ResQNet CI/CD Pipeline
 
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
 
env:
  DOCKER_IMAGE: resqnet-app
  DOCKER_TAG: ${{ github.sha }}
 
jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
      - name: Run application tests
        run: |
          cd app
          python -c "
          from app import app
          client = app.test_client()
          r = client.get('/health')
          assert r.status_code == 200
          print('Health check passed')
          r2 = client.get('/api/alerts')
          assert r2.status_code == 200
          print('Alerts API passed')
          r3 = client.get('/api/resources')
          assert r3.status_code == 200
          print('Resources API passed')
          print('All 3 tests passed!')
          "
 
  docker-build:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Summary
        run: |
          echo "Image pushed: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest"
 
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          kubectl version --client
      - name: Show deployment manifests
        run: |
          echo "=== deployment.yaml ===" && cat k8s/deployment.yaml
          echo "=== service.yaml ===" && cat k8s/service.yaml
      - name: Simulate Kubernetes deployment
        run: |
          echo "kubectl apply -f k8s/deployment.yaml"
          echo "> deployment.apps/resqnet-deployment created"
          echo ""
          echo "kubectl apply -f k8s/service.yaml"
          echo "> service/resqnet-service created"
          echo ""
          echo "kubectl get pods"
          echo "> NAME                                  READY   STATUS    RESTARTS   AGE"
          echo "> resqnet-deployment-5d8f9b7c4-xk2p9   1/1     Running   0          30s"
          echo "> resqnet-deployment-5d8f9b7c4-m7nq1   1/1     Running   0          30s"
          echo ""
          echo "kubectl get services"
          echo "> NAME               TYPE       CLUSTER-IP      PORT(S)        AGE"
          echo "> resqnet-service    NodePort   10.96.45.123    80:30080/TCP   30s"
          echo ""
          echo "ResQNet deployed! App running at http://localhost:30080"
          echo "Pipeline complete: Git -> CI/CD -> Docker -> Kubernetes -> Running App"
 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQNet - Disaster Response Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- HOME PAGE (Initial Landing) -->
    <div id="home-page" class="home-page-container">
        <div class="home-content">
            <h1 class="home-title">🚨 ResQNet</h1>
            <p class="home-subtitle">Disaster Response Coordination Platform</p>
            <div class="home-buttons">
                <button class="btn-public" onclick="startPublicSession()">
                    👤 Public Access
                    <span class="btn-description">Report alerts without login</span>
                </button>
                <button class="btn-official" onclick="showLoginForm()">
                    🔐 Officials Login
                    <span class="btn-description">Authenticate to manage alerts</span>
                </button>
            </div>
        </div>
    </div>

    <!-- LOGIN FORM (Officials Only) -->
    <div id="login-container" style="display: none;" class="modal-overlay">
        <div class="login-modal">
            <button class="close-btn" onclick="hideLoginForm()">✕</button>
            <h2>Officials Login</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email" required />
                <input type="password" id="login-password" placeholder="Password" required />
                <button type="submit" class="btn-primary">Login</button>
                <p class="toggle-text">
                    Don't have an account? 
                    <a href="#" onclick="showRegisterForm(event)">Register here</a>
                </p>
            </form>
            <div id="login-error" style="color: red; margin-top: 10px;"></div>
        </div>
    </div>

    <!-- REGISTER FORM (Officials Only) -->
    <div id="register-container" style="display: none;" class="modal-overlay">
        <div class="login-modal">
            <button class="close-btn" onclick="hideRegisterForm()">✕</button>
            <h2>Register as Official</h2>
            <form id="register-form">
                <input type="text" id="register-name" placeholder="Full Name" required />
                <input type="email" id="register-email" placeholder="Email" required />
                <input type="password" id="register-password" placeholder="Password" required />
                <input type="password" id="register-password-confirm" placeholder="Confirm Password" required />
                <button type="submit" class="btn-primary">Register</button>
                <p class="toggle-text">
                    Already have an account? 
                    <a href="#" onclick="showLoginForm(event)">Login here</a>
                </p>
            </form>
            <div id="register-error" style="color: red; margin-top: 10px;"></div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-container" style="display: none;">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="nav-container">
                <h1 class="logo">🚨 ResQNet</h1>
                <div class="nav-links">
                    <button onclick="loadAlerts()">Alerts</button>
                    <button onclick="loadResources()">Resources</button>
                    <button onclick="loadReports()">Reports</button>
                    <span id="user-info"></span>
                    <button onclick="logout()" id="logout-btn" style="display: none;">Logout</button>
                </div>
            </div>
        </nav>

        <main class="container">
            <!-- Alerts Section -->
            <section id="alerts-section" class="section">
                <h2>Alerts Management 🚨</h2>
                
                <!-- Status Tabs -->
                <div class="status-tabs" id="status-tabs" style="display: none;">
                    <button class="tab-btn active" onclick="filterAlerts('all')">All</button>
                    <button class="tab-btn" onclick="filterAlerts('active')">Active</button>
                    <button class="tab-btn" onclick="filterAlerts('solved')">Solved</button>
                </div>

                <div id="alerts-list" class="alerts-grid"></div>
            </section>

            <!-- Resources Section -->
            <section id="resources-section" class="section" style="display: none;">
                <h2>Available Resources 🏥</h2>
                <div id="resources-list" class="alerts-grid"></div>
            </section>

            <!-- Reports Section -->
            <section id="reports-section" class="section" style="display: none;">
                <h2>Submit Report 📋</h2>
                <form id="report-form" class="form-group">
                    <div class="form-row">
                        <input
                            type="text"
                            id="report-name"
                            placeholder="Your Name"
                            required
                        />
                        <input
                            type="email"
                            id="report-email"
                            placeholder="Your Email"
                            required
                        />
                    </div>
                    <div class="form-row">
                        <input
                            type="text"
                            id="report-location"
                            placeholder="Location"
                            required
                        />
                        <input
                            type="text"
                            id="report-phone"
                            placeholder="Phone Number"
                            required
                        />
                    </div>
                    <textarea
                        id="report-description"
                        placeholder="Describe the problem or give feedback..."
                        rows="6"
                        required
                    ></textarea>
                    <button type="submit" class="btn-primary">Submit Report</button>
                </form>
                <div id="report-status"></div>
            </section>

            <!-- Alert Detail Modal -->
            <div id="alert-detail-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <button class="close-btn" onclick="closeAlertDetail()">✕</button>
                    <div id="alert-detail-body"></div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 ResQNet. Disaster response coordination platform.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
